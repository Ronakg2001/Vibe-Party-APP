{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happnix | Profile Setup</title>
  <link rel="stylesheet" href="{% static 'css/signup_flow.css' %}" />
</head>
<body>
  <main class="card">
    <h1>Add Profile Details</h1>
    <p class="sub">Profile picture and bio are optional. You can skip now.</p>

    <form id="profileForm" novalidate>
      <label for="profilePictureUrl">Profile Picture URL</label>
      <input id="profilePictureUrl" type="url" placeholder="https://example.com/my-photo.jpg" />

      <label for="bio">Bio</label>
      <textarea id="bio" rows="4" placeholder="Write something about yourself"></textarea>

      <p id="error" class="error"></p>
      <p id="success" class="success"></p>

      <button id="saveBtn" type="submit">Save And Continue</button>
      <button id="skipBtn" type="button" class="ghost">Skip</button>
    </form>
  </main>

  
  
  <script id="signup-profile-optional-boot-config" type="application/json">{"csrfToken":"{{ csrf_token|escapejs }}"}</script>
  <script src="{% static 'js/signup_profile_optional.js' %}"></script>
</body>
</html>
