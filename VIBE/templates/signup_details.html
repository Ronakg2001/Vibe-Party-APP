{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VIBE. | Complete Details</title>
  <link rel="stylesheet" href="{% static 'css/signup_flow.css' %}" />
</head>
<body>
  <main class="card">
    <h1>Complete Your Account</h1>
    <p class="sub">Fill mandatory details to continue.</p>

    <form id="detailsForm" novalidate>
      <label for="fullName">Full Name</label>
      <input id="fullName" type="text" placeholder="Enter your full name" required />

      <label for="username">Username (unique)</label>
      <input id="username" type="text" placeholder="Choose a username" required />

      <label for="password">Password</label>
      <input id="password" type="password" placeholder="Create a password" required />
      <p class="sub" style="margin-top:-8px;">Use at least 8 chars with uppercase, lowercase, number, and special character.</p>

      <label for="sex">Sex</label>
      <select id="sex" required>
        <option value="">Select</option>
        <option value="mr.">Mr.</option>
        <option value="miss.">Miss.</option>
        <option value="mrs.">Mrs.</option>
        <option value="other">Other</option>
      </select>

      <label for="dob">Date of Birth (18+ only)</label>
      <input id="dob" type="date" required />

      <label for="email">Email Address</label>
      <input id="email" type="email" placeholder="you@example.com" required />

      <label for="mobile">Mobile Number</label>
      <input id="mobile" type="text" value="{{ mobile }}" readonly />

      <label for="govId">Government ID (optional for now)</label>
      <input id="govId" type="text" placeholder="e.g. Passport/Aadhaar/Driver ID number" />
      <p class="sub" style="margin-top:-8px;">Later this will be required to create or join parties.</p>

      <p id="error" class="error"></p>
      <p id="success" class="success"></p>
      <button id="submitBtn" type="submit">Continue</button>
    </form>
  </main>

  <script>
    const form = document.getElementById("detailsForm");
    const submitBtn = document.getElementById("submitBtn");
    const error = document.getElementById("error");
    const success = document.getElementById("success");
    const csrfTokenTemplate = "{{ csrf_token }}";

    function getCsrfToken() {
      if (csrfTokenTemplate && csrfTokenTemplate !== "NOTPROVIDED") {
        return csrfTokenTemplate;
      }
      const value = `; ${document.cookie}`;
      const parts = value.split(`; csrftoken=`);
      if (parts.length === 2) {
        return parts.pop().split(";").shift();
      }
      return "";
    }

    function setDobMax() {
      const dobInput = document.getElementById("dob");
      const today = new Date();
      const maxDate = new Date(today.getFullYear() - 18, today.getMonth(), today.getDate());
      dobInput.max = maxDate.toISOString().split("T")[0];
    }

    function isStrongPassword(value) {
      return /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[^A-Za-z\d]).{8,}$/.test(value);
    }

    async function postJson(url, payload) {
      const response = await fetch(url, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "X-CSRFToken": getCsrfToken()
        },
        credentials: "same-origin",
        body: JSON.stringify(payload)
      });

      const data = await response.json().catch(() => ({}));
      if (!response.ok) {
        throw new Error(data.message || "Request failed.");
      }
      return data;
    }

    setDobMax();

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      error.textContent = "";
      success.textContent = "";
      submitBtn.disabled = true;
      submitBtn.textContent = "Saving...";

      try {
        const passwordValue = document.getElementById("password").value.trim();
        if (!isStrongPassword(passwordValue)) {
          throw new Error("Password must have uppercase, lowercase, number, special character, and minimum 8 characters.");
        }

        const result = await postJson("/api/signup/details", {
          fullName: document.getElementById("fullName").value.trim(),
          username: document.getElementById("username").value.trim(),
          password: passwordValue,
          sex: document.getElementById("sex").value,
          dateOfBirth: document.getElementById("dob").value,
          email: document.getElementById("email").value.trim(),
          govId: document.getElementById("govId").value.trim()
        });

        success.textContent = result.message || "Saved.";
        if (result.redirectUrl) {
          window.location.href = result.redirectUrl;
        }
      } catch (err) {
        error.textContent = err.message;
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "Continue";
      }
    });
  </script>
  <script>
    (function () {
      function openHashTarget() {
        const hash = window.location.hash;
        if (!hash || hash.length < 2) return;
        const targetId = decodeURIComponent(hash.slice(1));
        const target = document.getElementById(targetId);
        if (!target) return;
        target.scrollIntoView({ behavior: "smooth", block: "start" });
        if (typeof target.focus === "function") {
          target.setAttribute("tabindex", "-1");
          target.focus({ preventScroll: true });
        }
      }

      window.routeToId = function (targetId, path) {
        if (!targetId) return;
        const encoded = encodeURIComponent(targetId);
        if (path && path !== window.location.pathname) {
          window.location.href = `${path}#${encoded}`;
          return;
        }
        window.location.hash = encoded;
      };

      window.addEventListener("hashchange", openHashTarget);
      window.addEventListener("DOMContentLoaded", openHashTarget);
    })();
  </script>
</body>
</html>
