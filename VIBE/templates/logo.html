<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Logo Showcase</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            /* Using a clean white background to seamlessly blend with the logo's background */
            background-color: #ffffff; 
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Inter', sans-serif;
        }

        .showcase-container {
            position: relative;
            perspective: 1200px;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Ambient floating dots matching the cyan/magenta from your logo */
        .ambient-dot {
            position: absolute;
            border-radius: 50%;
            opacity: 0.5;
            pointer-events: none;
            filter: blur(2px);
            animation: drift 8s infinite linear alternate;
        }

        @keyframes drift {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(40px, -40px) scale(1.2); }
        }

        .logo-wrapper {
            position: relative;
            transition: transform 0.15s ease-out;
            z-index: 10;
        }

        .main-logo {
            max-width: 85vw;
            max-height: 75vh;
            width: auto;
            height: auto;
            display: block;
            user-select: none;
            pointer-events: none;
            
            /* 1. Gentle floating breathing effect */
            animation: float 5s ease-in-out infinite, colorPulse 8s infinite alternate;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }

        /* 2. Subtle color shifting to make the blue/purple pop and feel alive */
        @keyframes colorPulse {
            0% { filter: hue-rotate(0deg) saturate(1); }
            50% { filter: hue-rotate(10deg) saturate(1.15); }
            100% { filter: hue-rotate(-5deg) saturate(1); }
        }

        .hint {
            position: absolute;
            bottom: 40px;
            color: #a0a0a0;
            font-size: 0.85rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            animation: fadeIn 2s ease 1s both;
            font-weight: 500;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="showcase-container" id="container">
        <div class="logo-wrapper" id="wrapper">
            <img src="E:\project\Party_connect_hub_redefine\VIBE\static\img\Logo_V_withoutdots.PNG" alt="V Logo" class="main-logo" onerror="this.onerror=null; this.src='https://via.placeholder.com/600x400/FFFFFF/000000?text=Logo_V.PNG+Not+Found'">
        </div>
    </div>

    <script>
        const container = document.getElementById('container');
        const wrapper = document.getElementById('wrapper');

        // 3D Tilt Interaction (Subtle enough to not break the flat background illusion)
        container.addEventListener('mousemove', (e) => {
            const x = e.clientX;
            const y = e.clientY;
            
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;
            
            const deltaX = (x - centerX) / centerX;
            const deltaY = (y - centerY) / centerY;
            
            // Softer rotation for the light theme
            const rotateX = deltaY * -6; 
            const rotateY = deltaX * 6;
            
            wrapper.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(1.02)`;
        });

        // Reset gently on mouse leave
        container.addEventListener('mouseleave', () => {
            wrapper.style.transform = `rotateX(0deg) rotateY(0deg) scale(1)`;
        });
    </script>
</body>
</html>
