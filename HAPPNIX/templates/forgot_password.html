{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happnix | Forgot Password</title>
  <link rel="stylesheet" href="{% static 'css/forgot_password.css' %}"/>
</head>
<body>
    <a href="/signin" class="back-home">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
    </a>
  <div class="orb orb-violet"></div>
  <div class="orb orb-fuchsia"></div>

  <main class="card glass-card">
    <h1>Forgot Password</h1>
    <p class="sub">Enter your email address for verification and reset instructions.</p>
    <form id="forgotPasswordForm" novalidate>
      <label for="email">Email Address</label>
      <input id="email" type="email" placeholder="you@example.com" required />
      <p id="errorMsg" class="error"></p>
      <p id="successMsg" class="success"></p>
      <button id="submitBtn" type="submit">Send Verification Link</button>
    </form>
    <div class="back">
      <a href='/signin'>Back to Login</a>
    </div>
  </main>

  
  
  <script id="forgot-password-boot-config" type="application/json">{"csrfToken":"{{ csrf_token|escapejs }}"}</script>
  <script src="{% static 'js/forgot_password.js' %}"></script>
</body>
</html>
