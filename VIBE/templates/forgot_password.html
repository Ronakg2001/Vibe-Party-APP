{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VIBE. | Forgot Password</title>
  <link rel="stylesheet" href="{% static 'css/forgot_password.css' %}"/>
</head>
<body>
    <a href="/signin" class="back-home">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
    </a>
  <div class="orb orb-violet"></div>
  <div class="orb orb-fuchsia"></div>

  <main class="card glass-card">
    <h1>Forgot Password</h1>
    <p class="sub">Enter your email address for verification and reset instructions.</p>
    <form id="forgotPasswordForm" novalidate>
      <label for="email">Email Address</label>
      <input id="email" type="email" placeholder="you@example.com" required />
      <p id="errorMsg" class="error"></p>
      <p id="successMsg" class="success"></p>
      <button id="submitBtn" type="submit">Send Verification Link</button>
    </form>
    <div class="back">
      <a href='/signin'>Back to Login</a>
    </div>
  </main>

  <script>
    const form = document.getElementById("forgotPasswordForm");
    const email = document.getElementById("email");
    const errorMsg = document.getElementById("errorMsg");
    const successMsg = document.getElementById("successMsg");
    const submitBtn = document.getElementById("submitBtn");
    const csrfTokenTemplate = "{{ csrf_token }}";

    function getCsrfToken() {
      if (csrfTokenTemplate && csrfTokenTemplate !== "NOTPROVIDED") {
        return csrfTokenTemplate;
      }
      const value = `; ${document.cookie}`;
      const parts = value.split(`; csrftoken=`);
      if (parts.length === 2) {
        return parts.pop().split(";").shift();
      }
      return "";
    }

    async function postJson(url, payload) {
      const response = await fetch(url, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "X-CSRFToken": getCsrfToken()
        },
        credentials: "same-origin",
        body: JSON.stringify(payload)
      });

      let body = {};
      try {
        body = await response.json();
      } catch (_error) {
        body = {};
      }

      if (!response.ok) {
        throw new Error(body.message || "Request failed. Please try again.");
      }

      return body;
    }

    function setLoading(loading) {
      submitBtn.disabled = loading;
      submitBtn.textContent = loading ? "Sending..." : "Send Verification Link";
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      const emailValue = email.value.trim();
      errorMsg.textContent = "";
      successMsg.textContent = "";

      if (!emailValue) {
        errorMsg.textContent = "Please enter your email address.";
        return;
      }

      setLoading(true);
      try {
        const result = await postJson("/api/auth/password/forgot", { email: emailValue });
        successMsg.textContent = result.message || "Verification email sent successfully.";
      } catch (error) {
        errorMsg.textContent = error.message;
      } finally {
        setLoading(false);
      }
    });
  </script>
  <script>
    (function () {
      function openHashTarget() {
        const hash = window.location.hash;
        if (!hash || hash.length < 2) return;
        const targetId = decodeURIComponent(hash.slice(1));
        const target = document.getElementById(targetId);
        if (!target) return;
        target.scrollIntoView({ behavior: "smooth", block: "start" });
        if (typeof target.focus === "function") {
          target.setAttribute("tabindex", "-1");
          target.focus({ preventScroll: true });
        }
      }

      window.routeToId = function (targetId, path) {
        if (!targetId) return;
        const encoded = encodeURIComponent(targetId);
        if (path && path !== window.location.pathname) {
          window.location.href = `${path}#${encoded}`;
          return;
        }
        window.location.hash = encoded;
      };

      window.addEventListener("hashchange", openHashTarget);
      window.addEventListener("DOMContentLoaded", openHashTarget);
    })();
  </script>
</body>
</html>
